<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odia movies-stream & details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .movie-card:hover { transform: scale(1.05); transition: 0.3s; z-index: 10; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .modal { display: none; background: rgba(0,0,0,0.9); scrollbar-width: none; }
        .modal::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- Header & Search -->
    <header class="p-5 sticky top-0 bg-slate-900 shadow-2xl z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-bold text-red-600 tracking-tighter uppercase italic">ଓଡ଼ିଆ<span class="text-white">movies</span></h1>
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchBar" onkeyup="searchMovie()" placeholder="Movies search" class="w-full p-3 pl-10 rounded-full bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-red-500 text-white">
                <i class="fa fa-search absolute left-4 top-4 text-slate-400"></i>
            </div>
        </div>
    </header>

    <!-- Movie Grid -->
    <main class="max-w-7xl mx-auto p-5">
        <div id="movieGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- Movies will auto-load here -->
        </div>
    </main>

    <!-- Movie Details Modal -->
    <div id="movieModal" class="modal fixed inset-0 z-[100] p-5 overflow-y-auto">
        <div class="max-w-4xl mx-auto bg-slate-900 rounded-xl overflow-hidden relative shadow-2xl border border-slate-800 my-10">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl text-white hover:text-red-500 z-50">&times;</button>
            
            <div id="modalContent">
                <!-- Details will be injected here -->
            </div>
        </div>
    </div>

    <script>
        /* 
           INSTRUCTIONS: 
           1. TMDB_API_KEY me apni API key dalein.
           2. Niche 'movieData' array ke andar apni movies paste karein.
        */

        const TMDB_API_KEY = "10a4fc6dd1d668b929f4cccccfc48d45"; // Yahan apni key dalein

        // APNI MOVIES YAHAN PASTE KAREIN
        const movieData = [
            { MOVIE_NAME: "Jawan", MOVIE_LINK: "https://example.com/movie.mp4" },
            { MOVIE_NAME: "The Dark Knight", MOVIE_LINK: "https://vidsrc.me/embed/movie/tt0468569" },
            { MOVIE_NAME: "Jawan", MOVIE_LINK: "https://www.google.com" },

            // Aap jitni baar chahe niche naya line add kar sakte hain:
            // { MOVIE_NAME: "Movie Ka Naam", MOVIE_LINK: "Movie Ka Link" },
        ];

        const grid = document.getElementById('movieGrid');

        async function initApp() {
            grid.innerHTML = "";
            for (const movie of movieData) {
                const details = await fetchTMDBData(movie.MOVIE_NAME);
                if (details) {
                    renderMovie(movie, details);
                }
            }
        }

        async function fetchTMDBData(name) {
            try {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(name)}`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    const movieID = data.results[0].id;
                    const detailRes = await fetch(`https://api.themoviedb.org/3/movie/${movieID}?api_key=${TMDB_API_KEY}&append_to_response=credits,videos`);
                    return await detailRes.json();
                }
            } catch (err) { console.error("Error fetching TMDB:", err); }
            return null;
        }

        function renderMovie(movie, details) {
            const card = document.createElement('div');
            card.className = "movie-card bg-slate-800 rounded-lg overflow-hidden cursor-pointer shadow-lg";
            card.onclick = () => showDetails(movie, details);
            
            const poster = details.poster_path ? `https://image.tmdb.org/t/p/w500${details.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Poster';
            
            card.innerHTML = `
                <img src="${poster}" class="w-full h-64 object-cover">
                <div class="p-3">
                    <h3 class="font-bold text-sm truncate">${details.title}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-xs text-yellow-500"><i class="fa fa-star"></i> ${details.vote_average.toFixed(1)}</span>
                        <span class="text-xs text-slate-400">${details.release_date.split('-')[0]}</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        function showDetails(movie, details) {
            const modal = document.getElementById('movieModal');
            const content = document.getElementById('modalContent');
            modal.style.display = "block";
            document.body.style.overflow = "hidden";

            const cast = details.credits.cast.slice(0, 6).map(c => `
                <div class="text-center">
                    <img src="${c.profile_path ? 'https://image.tmdb.org/t/p/w200' + c.profile_path : 'https://via.placeholder.com/100x100?text=No+Photo'}" class="w-16 h-16 rounded-full mx-auto object-cover border-2 border-red-500">
                    <p class="text-[10px] mt-1">${c.name}</p>
                </div>
            `).join('');

            const trailer = details.videos.results.find(v => v.type === 'Trailer');
            const trailerHtml = trailer ? `
                <div class="mt-5">
                    <h4 class="font-bold mb-2">👆ଏହି movieର trailerକୁ ଦେଖନ୍ତୁ👇</h4>
                    <iframe class="w-full h-64 rounded-lg" src="https://www.youtube.com/embed/${trailer.key}" frameborder="0" allowfullscreen></iframe>
                </div>
            ` : '';

            const isDirect = movie.MOVIE_LINK.match(/\.(mp4|mkv|webm|ogg)/i);
            const playButton = isDirect 
                ? `<video controls class="w-full rounded-lg bg-black mt-4"><source src="${movie.MOVIE_LINK}" type="video/mp4">Browser not supported</video>`
                : `<a href="${movie.MOVIE_LINK}" target="_blank" class="block w-full text-center bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg mt-5 transition"><i class="fa fa-play mr-2"></i>ଏଠାରେ click କରି 😀ଦେଖନ୍ତୁ</a>`;

            content.innerHTML = `
                <img src="https://image.tmdb.org/t/p/original${details.backdrop_path}" class="w-full h-64 object-cover opacity-40">
                <div class="p-6 -mt-32 relative">
                    <div class="flex flex-col md:flex-row gap-6">
                        <img src="https://image.tmdb.org/t/p/w500${details.poster_path}" class="w-40 rounded-lg shadow-2xl border border-slate-700">
                        <div class="flex-1">
                            <h2 class="text-3xl font-bold">${details.title}</h2>
                            <p class="text-slate-400 text-sm mt-2 italic">${details.tagline || ''}</p>
                            <div class="flex gap-4 mt-3 text-sm">
                                <span class="bg-yellow-600 px-2 py-1 rounded">🌟${details.vote_average.toFixed(1)}</span>
                                <span class="bg-slate-700 px-2 py-1 rounded">${details.runtime} min</span>
                                <span class="bg-slate-700 px-2 py-1 rounded">${details.release_date}</span>
                            </div>
                            <p class="mt-4 text-slate-300 leading-relaxed">${details.overview}</p>
                        </div>
                    </div>

                    <div class="mt-8">
                        <h4 class="font-bold mb-4">👆ଏହି movieର cast👇</h4>
                        <div class="grid grid-cols-3 md:grid-cols-6 gap-4">${cast}</div>
                    </div>

                    ${playButton}
                    ${trailerHtml}
                </div>
            `;
        }

        function closeModal() {
            document.getElementById('movieModal').style.display = "none";
            document.body.style.overflow = "auto";
            document.getElementById('modalContent').innerHTML = "";
        }

        function searchMovie() {
            const input = document.getElementById('searchBar').value.toLowerCase();
            const cards = document.getElementsByClassName('movie-card');
            
            for (let card of cards) {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(input) ? "block" : "none";
            }
        }

        // Start the app
        initApp();
    </script>
</body>
</html>
