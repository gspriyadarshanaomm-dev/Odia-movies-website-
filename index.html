<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odia movies app</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #0f0f0f; --card-bg: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Search Bar */
        header { padding: 20px; background: #000; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .search-box { width: 80%; max-width: 600px; padding: 12px 20px; border-radius: 25px; border: none; outline: none; font-size: 16px; background: #222; color: #fff; }

        /* Movie Grid */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .movie-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.3s; position: relative; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; }
        .movie-info { padding: 10px; text-align: center; }
        .movie-info h3 { margin: 5px 0; font-size: 14px; font-weight: 400; color: #ccc; }

        /* Modal / Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; z-index: 2000; overflow-y: auto; padding-top: 50px; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: var(--primary); }
        .details-container { max-width: 800px; margin: auto; padding: 20px; text-align: center; }
        .player-box { width: 100%; aspect-ratio: 16/9; background: #000; border: 2px solid #333; margin-bottom: 20px; }
        .details-header { display: flex; gap: 20px; text-align: left; margin-bottom: 20px; }
        .details-header img { width: 150px; border-radius: 10px; }
        .cast { color: #aaa; font-size: 14px; margin: 10px 0; }
        .play-btn { background: var(--primary); color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 10px; width: 100%; }

        @media (max-width: 600px) {
            .container { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 10px; }
            .details-header { flex-direction: column; text-align: center; }
            .details-header img { width: 120px; margin: auto; }
        }
    </style>
</head>
<body>

<header>
    <input type="text" class="search-box" id="searchInput" placeholder="😀ଓଡ଼ିଆ movies search" onkeyup="filterMovies()">
</header>

<div class="container" id="movieGrid">
    <!-- Movies will appear here -->
</div>

<!-- Movie Details Modal -->
<div class="overlay" id="movieModal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="details-container" id="modalContent">
        <!-- Content dynamic -->
    </div>
</div>

<script>
    /* 
       --- TMDB SETUP ---
       1. Visit https://www.themoviedb.org/
       2. Account banayein aur API Key lein.
       3. Niche di gayi 'TMDB_API_KEY' mein apni key dalein.
    */
    const TMDB_API_KEY = "10a4fc6dd1d668b929f4cccccfc48d45"; 

    // --- MOVIE LIST SECTION ---
    // Aapko sirf niche diye gaye format mein movies add karni hain.
    const moviesList = [
        { MOVIE_NAME: "Jawan", MOVIE_LINK: "https://example.com/video.mp4" },
        { MOVIE_NAME: "Animal", MOVIE_LINK: "https://example.com/animal" },
        { MOVIE_NAME: "Fighter", MOVIE_LINK: "https://vidsrc.to/embed/movie/tt123456" },
        // Niche Nayi Movie Paste Karein (Dhyaan rahe ki akhri wali movie ke baad comma ',' na ho)
    ];

    const movieGrid = document.getElementById('movieGrid');

    // Function to load all movies
    async function initApp() {
        movieGrid.innerHTML = '';
        for (let movie of moviesList) {
            const data = await getTMDBData(movie.MOVIE_NAME);
            renderMovieCard(movie, data);
        }
    }

    // Fetch data from TMDB
    async function getTMDBData(name) {
        try {
            const searchUrl = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(name)}`;
            const res = await fetch(searchUrl);
            const searchData = await res.json();
            
            if (searchData.results && searchData.results.length > 0) {
                const movieId = searchData.results[0].id;
                const detailsUrl = `https://api.themoviedb.org/3/movie/${movieId}?api_key=${TMDB_API_KEY}&append_to_response=credits,videos`;
                const detailsRes = await fetch(detailsUrl);
                return await detailsRes.json();
            }
        } catch (e) { console.log("Error fetching TMDB", e); }
        return null;
    }

    function renderMovieCard(movie, data) {
        const poster = data ? `https://image.tmdb.org/t/p/w500${data.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Poster';
        
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.innerHTML = `
            <img src="${poster}" alt="${movie.MOVIE_NAME}">
            <div class="movie-info">
                <h3>${movie.MOVIE_NAME}</h3>
            </div>
        `;
        card.onclick = () => openModal(movie, data);
        movieGrid.appendChild(card);
    }

    function openModal(movie, data) {
        const modal = document.getElementById('movieModal');
        const content = document.getElementById('modalContent');
        const poster = data ? `https://image.tmdb.org/t/p/w500${data.poster_path}` : '';
        const overview = data ? data.overview : "No description available.";
        const cast = data ? data.credits.cast.slice(0, 5).map(c => c.name).join(', ') : "N/A";
        const trailer = data?.videos?.results.find(v => v.type === 'Trailer');

        let playerHTML = '';
        const isDirectLink = movie.MOVIE_LINK.match(/\.(mp4|webm|ogg|m4v)$/i);

        if (isDirectLink) {
            playerHTML = `<video class="player-box" controls poster="${poster}"><source src="${movie.MOVIE_LINK}" type="video/mp4"></video>`;
        } else {
            playerHTML = `<div class="player-box"><p style="padding:20px; color:#666;">External Source Player</p></div>`;
        }

        content.innerHTML = `
            ${playerHTML}
            <div class="details-header">
                <img src="${poster}">
                <div>
                    <h1>${movie.MOVIE_NAME}</h1>
                    <p>${overview}</p>
                    <div class="cast"><strong>Cast:</strong> ${cast}</div>
                    <button class="play-btn" onclick="handlePlay('${movie.MOVIE_LINK}')">😀ଦେଖନ୍ତୁ</button>
                    ${trailer ? `<br><small><a href="https://www.youtube.com/watch?v=${trailer.key}" target="_blank" style="color:#e50914;">😀👆ଏହି ଓଡ଼ିଆ movieର trailer ଦେଖନ୍ତୁ</a></small>` : ''}
                </div>
            </div>
        `;
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function handlePlay(link) {
        const isDirectLink = link.match(/\.(mp4|webm|ogg|m4v)$/i);
        if (!isDirectLink) {
            window.open(link, '_blank');
        } else {
            alert("Video already playing in player!");
        }
    }

    function closeModal() {
        document.getElementById('movieModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('modalContent').innerHTML = '';
    }

    function filterMovies() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('movie-card');
        for (let card of cards) {
            let title = card.innerText.toLowerCase();
            card.style.display = title.includes(input) ? "block" : "none";
        }
    }

    // Initialize the app
    initApp();
</script>

</body>
</html>
